<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task List</title>
  <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@100..800&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" href="TA SK.svg">
  <link rel="stylesheet" href="styles/index.css">
</head>
<body class="conteiner">
  <header>
    <div>
      <span id="Title"> Task list </span>
      <button type="button" id="primary-btn">Nova Tarefa +</button>
    </div>
  </header>

  <main>
    <section class="task-group" data-status="Finalizado">
      <h2 class="group-title">Tarefas Finalizadas</h2>
      <div class="group-list" id="lista-finalizado"></div>
    </section>

    <section class="task-group" data-status="Iniciado">
      <h2 class="group-title">Tarefas Iniciadas</h2>
      <div class="group-list" id="lista-iniciado"></div>
    </section>

    <section class="task-group" data-status="Não iniciado">
      <h2 class="group-title">Tarefas Não Iniciadas</h2>
      <div class="group-list" id="lista-nao-iniciado"></div>
    </section>

    <p id="count">0 Tarefas</p>
  </main>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2 id="modal-titulo">Adicionar tarefa</h2>

      <form id="form-tarefa">
        <label for="input-titulo">Título</label>
        <input type="text" id="input-titulo" required>

        <label for="input-descricao">Descrição</label>
        <textarea id="input-descricao" required></textarea>

        <div class="modal-row">
          <div class="modal-field">
            <label for="input-dificuldade">Dificuldade</label>
            <select id="input-dificuldade">
              <option value="Fácil">Fácil</option>
              <option value="Médio">Médio</option>
              <option value="Difícil">Difícil</option>
            </select>
          </div>

          <div class="modal-field">
            <label for="input-prazo">Prazo</label>
            <input type="date" id="input-prazo" required>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" id="btn-cancelar">Cancelar</button>
          <button type="submit" id="btn-salvar">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
