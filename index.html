<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task List</title>
  <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@100..800&display=swap" rel="stylesheet">
  
  <link rel="icon" type="image/png" href="Vector.svg">
  <link rel="stylesheet" href="styles/index.css">
</head>
<body class="conteiner">
    <header >
      <div>
      <span id="Title"> Task list </span>
        <button type="button" id="primary-btn">Nova Tarefa +</button>
      </div>
    </header>
    <main>
<div class="task">
  <div class="task-header">
    <div class="task-title-group">
      <h1>Melhorar interface</h1>
      <h3>Melhorar o UI/UX da interface</h3>
    </div>
    <div class="status">
      <p>Finalizado</p>
    </div>
  </div>

  <div class="task-main">
    <div class="task-meta">
      <div class="dificult">
        <p>Fácil</p>
      </div>
      <div class="term">
        <p>01/07/2026</p>
      </div>
    </div>
    
    <div class="task-actions">
      <div class="edit">
        <p>Editar</p>
      </div>
      <div class="remove">
        <p>Remover</p>
      </div>
    </div>
  </div>
</div>
        <p>
          0 Tarefas
        </p>
      </div>
    </main>

  <script src="scripts.js"></script>
</body>
</html>
